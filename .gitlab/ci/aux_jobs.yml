trigger ci tool:
  stage: aux jobs
  trigger:
    include:
      - local: .gitlab/ci/ci_tool.yml
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

trigger sissue tool:
  stage: aux jobs
  trigger:
    include:
      - local: .gitlab/ci/sissue_tool.yml
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

devvm:packer:deploy:
  stage: aux jobs
  image: registry.gitlab.com/gitlab-org/container-registry/packer-ci:v1.0.0
  script: |
    PKR_VAR_image_tag=$CI_COMMIT_SHORT_SHA

    if [ "$CI_COMMIT_REF_NAME" = "$CI_DEFAULT_BRANCH" ]
    then
      PKR_VAR_image_tag=current
    fi

    packer init ./devvm/packer/
    packer build \
        -force \
        -timestamp-ui \
        -color=false \
            ./devvm/packer/
  needs:
    - devvm:packer:validate
  rules:
    - <<: *if-fork-merge-request
      when: never
    - changes:
        - devvm/ansible/**/*
        - devvm/go/**/*
        - devvm/packer/*
      when: manual
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://vault.gitlab.net
  secrets:
    PKR_VAR_account_file:
      vault: ${VAULT_SECRETS_PATH}/shared/devvm_gcp_creds/json_key@ci
      token: $VAULT_ID_TOKEN
      file: true
