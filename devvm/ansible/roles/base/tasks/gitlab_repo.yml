---
- name: Install required packages for repository management
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - apt-transport-https
      - gnupg
    state: present
    update_cache: yes
  register: __pkgmgr_result
  until: __pkgmgr_result is succeeded
  retries: 3
  delay: 3

- name: Create APT keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
    owner: root
    group: root

# GitLab EE Repository Setup
- name: Download GitLab EE GPG key
  ansible.builtin.get_url:
    url: https://packages.gitlab.com/gitlab/gitlab-ee/gpgkey
    dest: /tmp/gitlab-ee.asc
    mode: "0644"
  register: __gpg_ee_result
  until: __gpg_ee_result is succeeded
  retries: 3
  delay: 3

- name: Convert and install GitLab EE GPG key
  ansible.builtin.shell:
    cmd: |
      gpg --dearmor < /tmp/gitlab-ee.asc > /etc/apt/keyrings/gitlab-ee-archive-keyring.gpg
    creates: /etc/apt/keyrings/gitlab-ee-archive-keyring.gpg

- name: Clean up temporary GitLab EE GPG key file
  ansible.builtin.file:
    path: /tmp/gitlab-ee.asc
    state: absent

- name: Set correct permissions on GitLab EE GPG keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings/gitlab-ee-archive-keyring.gpg
    mode: "0644"
    owner: root
    group: root

- name: Add GitLab EE repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/gitlab-ee-archive-keyring.gpg] https://packages.gitlab.com/gitlab/gitlab-ee/ubuntu/ {{ ansible_facts['distribution_release'] }} main"
    filename: gitlab-ee
    state: present

- name: Add GitLab EE source repository
  ansible.builtin.apt_repository:
    repo: "deb-src [signed-by=/etc/apt/keyrings/gitlab-ee-archive-keyring.gpg] https://packages.gitlab.com/gitlab/gitlab-ee/ubuntu/ {{ ansible_facts['distribution_release'] }} main"
    filename: gitlab-ee
    state: present

