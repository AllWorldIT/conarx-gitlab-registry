---
- name: Install the latest nginx
  ansible.builtin.apt:
    name:
      - update-motd
    state: present
  register: __pkgmgr_result
  until: __pkgmgr_result is succeeded
  retries: 3
  delay: 3

- name: Disable default motd scripts
  file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: "a-x"
  loop:
    - 00-header
    - 10-help-text
    - 50-landscape-sysinfo
    - 50-motd-news
    - 90-updates-available
    - 91-contract-ua-esm-status
    - 91-release-upgrade
    - 92-unattended-upgrades
    - 95-hwe-eol
    - 97-overlayroot
    - 98-fsck-at-reboot
    - 98-reboot-required
  ignore_errors: true

- name: Upload static devvm motd scripts
  copy:
    src: "{{ item }}"
    dest: "/etc/update-motd.d/{{ item }}"
    owner: root
    group: root
    mode: 0755
  loop:
    - 00-welcome
    - 20-booter-status

- name: Template devvm motd /etc/hosts script
  template:
    src: "{{ item }}"
    dest: "/etc/update-motd.d/{{ item }}"
    owner: root
    group: root
    mode: 0755
  loop:
    - 10-etchosts
