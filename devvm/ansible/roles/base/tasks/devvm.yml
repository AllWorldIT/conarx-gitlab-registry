---

# Devvm repo actually resides in container-registry, but we want to keep it
# separate from the checkout above to make things more robust/less
# error-prone.
- name: Checkout devvm
  ansible.builtin.git:
    repo: https://gitlab.com/gitlab-org/container-registry.git
    dest: /home/dev/devvm
    accept_hostkey: true
    version: master
    depth: 1
  # ssh auth sock issues
  become: true
  become_flags: -SHE
  become_user: dev

