---
- name: Install nginx and deps
  ansible.builtin.apt:
    name:
      - nginx
      - mkcert
    state: present
  register: __pkgmgr_result
  until: __pkgmgr_result is succeeded
  retries: 3
  delay: 3

- name: remove nginx default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: upload TLS proxy site for wireguard UI
  ansible.builtin.template:
    src: wireguard-ui.nginx-conf.j2
    dest: /etc/nginx/conf.d/default.conf
    owner: root
    group: root
    mode: 0644
  notify: restart nginx

- name: Create certs for nginx
  ansible.builtin.command:
    cmd: mkcert -cert-file /etc/nginx/devvm.crt.pem -key-file /etc/nginx/devvm.key.pem devvm
    creates: /etc/nginx/devvm.crt.pem
  notify: restart nginx

- name: Adjust permissions and ownership of certs
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: www-data
    mode: 0640
  loop:
    - /etc/nginx/devvm.crt.pem
    - /etc/nginx/devvm.key.pem

- name: enable and start nginx service
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
