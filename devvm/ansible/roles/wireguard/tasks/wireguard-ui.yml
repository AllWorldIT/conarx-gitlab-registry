---
- name: Create wireguard-ui configuration file
  ansible.builtin.template:
    src: wg-easy.j2
    dest: /etc/default/wg-easy
    owner: root
    group: root
    mode: 0600

- name: Run wg-easy container
  community.docker.docker_container:
    name: wg-easy
    # we need >=15.2 to have support for INIT_ALLOWED_IPS
    image: ghcr.io/wg-easy/wg-easy:15.2.0-beta.3
    state: present
    restart_policy: unless-stopped
    networks:
      - name: wghub
        ipv4_address: "{{ wireguard_ui_ip }}"
    env_file: /etc/default/wg-easy
    volumes:
      - "/etc/wg-easy:/etc/wireguard"
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51820:51821/tcp"
    capabilities:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.all.forwarding: "1"
      net.ipv6.conf.default.forwarding: "1"
