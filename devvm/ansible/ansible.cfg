[inventory]
enable_plugins = gcp_compute

[defaults]
inventory = inventory/gcp.yml

[ssh_connection]
# Enabling pipelining reduces the number of SSH operations required to execute
# a module on the remote server. This can result in a significant performance
# improvement when enabled.
pipelining = True
ssh_executable = misc/gcp-ssh-wrapper.sh
# Tell ansible to use SCP for file transfers when connection is set to SSH
scp_if_ssh = True
scp_executable = misc/gcp-scp-wrapper.sh
# NOTE(prozlach): WARNING - SCP became deprecated with OpenSSL 9+, we need
# to explicitly enable it with `-O` option for cloud-login to work. In the next
# bump of the base CI image, we will probably need to find a different way to
# copy files. See also https://github.com/ansible/ansible/issues/78600
scp_extra_args="-O"
